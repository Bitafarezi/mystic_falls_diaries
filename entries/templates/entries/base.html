{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mystic Falls Diaries{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <header>
        <h1>The Vampire Diaries</h1>
        <p>The deepest secrets stay hidden behind vervain...</p>
        {% if user.is_authenticated %}
            <nav>
                <a href="{% url 'entries:entry-list' %}">My Diary</a> | 
                <a href="{% url 'entries:entry-create' %}">Write New Secret</a>
            </nav>
        {% endif %}
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
